<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Mar y Palmas</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>body{font-family:Arial;background:#eef}.c{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:20px}img{max-width:220px;display:block;margin:auto}input{width:100%;padding:8px;margin:5px 0}button{padding:12px;width:100%;margin:10px 0}.row{padding:5px;border-bottom:1px solid #ddd}</style></head><body><div class="c"><img src="logo_mar_y_palmas.png"><h2>Encuesta Comunitaria</h2><input id="nombre" placeholder="Nombre"><input id="casa" placeholder="Número de casa"><input id="personas" type="number" min="1" value="1"><p>Seleccione actividades:</p><label><input type="checkbox" value="Bingo"> Bingo</label><br><label><input type="checkbox" value="Jabones"> Jabones</label><br><label><input type="checkbox" value="Salud"> Feria Salud</label><br><label><input type="checkbox" value="Estiramientos"> Estiramientos</label><br><label><input type="checkbox" value="Caminata"> Caminata</label><button onclick="votar()">Enviar</button><button onclick="window.print()">Imprimir</button><button onclick="wa()">Compartir WhatsApp</button><h3>Total asistentes estimados: <span id="asist">0</span></h3><div id="lista"></div><canvas id="g"></canvas></div><script>const acts=['Bingo','Jabones','Salud','Estiramientos','Caminata'];function load(){let p=JSON.parse(localStorage.participantes||'[]');document.getElementById('lista').innerHTML='<h3>Participantes</h3>'+p.map(x=>`<div class=row>${x.nombre} Casa ${x.casa} (${x.personas})</div>`).join('');document.getElementById('asist').textContent=p.reduce((a,b)=>a+parseInt(b.personas),0);let d=acts.map(a=>parseInt(localStorage[a]||0));if(window.ch)ch.destroy();window.ch=new Chart(document.getElementById('g'),{type:'bar',data:{labels:acts,datasets:[{label:'Votos',data:d}]}});}function votar(){let n=nombre.value,c=casa.value,p=personas.value;if(!n||!c){alert('Complete nombre y casa');return;}let s=[...document.querySelectorAll('input[type=checkbox]:checked')];if(!s.length){alert('Seleccione actividades');return;}let part=JSON.parse(localStorage.participantes||'[]');part.push({nombre:n,casa:c,personas:p});localStorage.participantes=JSON.stringify(part);s.forEach(x=>localStorage[x.value]=(parseInt(localStorage[x.value]||0)+1));alert('Gracias por participar');location.reload();}function wa(){window.open('https://wa.me/?text='+encodeURIComponent('Participa en la encuesta de Mar y Palmas: '+location.href));}load();</script></body></html>
